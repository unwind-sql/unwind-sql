name: Release

# Publishes unwind-sql to PyPI whenever a GitHub Release is published.
# Create the release from a tag (e.g. v0.1.0) after bumping the version in
# pyproject.toml.
on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run checks
        run: |
          uv sync --all-extras
          uv run ruff check
          uv run pytest

  publish:
    needs: test
    runs-on: ubuntu-latest
    # The environment name must match the Trusted Publisher configured on PyPI.
    environment:
      name: pypi
      url: https://pypi.org/project/unwind-sql/
    permissions:
      # Required for PyPI trusted publishing (OIDC); no API token needed.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        run: uv publish
